version: '3.8'

services:
  # PostgreSQL 16 — Source of truth for all structured data
  # One database per service, auto-created via init scripts
  postgres:
    image: postgres:16-alpine
    container_name: dealance-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dealance
      POSTGRES_PASSWORD: dealance
      POSTGRES_DB: dealance_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealance"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7 — Speed layer (sessions, OTP, cache, rate limits)
  redis:
    image: redis:7-alpine
    container_name: dealance-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ScyllaDB — Write-heavy, append-only (chat messages, views, audit log)
  scylla:
    image: scylladb/scylla:5.4
    container_name: dealance-scylla
    ports:
      - "9042:9042"
      - "9160:9160"
    command: --smp 1 --memory 512M --overprovisioned 1
    volumes:
      - scylladata:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Neo4j — Graph traversal, social graph, recommendations
  neo4j:
    image: neo4j:5.15-community
    container_name: dealance-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dealance123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Typesense — Full-text search
  typesense:
    image: typesense/typesense:0.25.2
    container_name: dealance-typesense
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: dealance-dev-key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesensedata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog — Local SMTP (catches all emails)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dealance-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # LocalStack — Local AWS (S3, SQS, SES, SNS)
  localstack:
    image: localstack/localstack:3.0
    container_name: dealance-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,ses,sns
      DEFAULT_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
    volumes:
      - localstackdata:/var/lib/localstack

volumes:
  pgdata:
  redisdata:
  scylladata:
  neo4jdata:
  typesensedata:
  localstackdata:
